body:
  text: 試驗方法各種其二百公分以索克萊氏浸出器先用醚次用木精甲醇然後更用水各別抽出其可溶分製為浸膏而檢查之就中對於醚制浸膏則以酸性水煉合之取其酸性水以醚振之後以炭酸鈉使其酸性水變呈鹼性再以醚振之然後更以苛性鈉使其呈強鹼性再以醚振之取醚液各各蒸發後所得之物質試以各種贋鹼試藥時則得如下之成績第一表第二表第三表袁淑範按神農本草經中所載藥品乏總數為三百六十五至梁陶弘景則加名醫副品三百六十五為七百三十種其後代有增加及至明李時珍之本草綱目則已增至千八百九十餘種矣如更加本草綱目拾遺中之藥品時則可至二千種以上如斯數目浩翰之藥品吾人一啓研究之興趣因其能使人咸感無從著手之煩難而中止況且古來之所謂藥者並非專指治病之純醫療用的物質所以漢藥中有穀類肉類蔬菜香料釀成品等增進健康之滋養料又有久服輕身延年益壽等以欲成仙之目的所用之強壯藥更加如人參五加等因古來之傳說民間的迷信為人所崇拜者如黃耆黃蘗等因其色黃以為可治黃疸紅花丹參等因其色紅以為可治血病者等時更使人迷離無著矣然本草中對於各藥常注明其簡單之性質如有毒無毒是也以服用無奪無害不但可治病且久服又可延年益壽者為最上品其次治病即現今所稱謂藥者以之為中品之藥雖能治病然連用則能害人更次者則為下品有毒治病時不可或缺為純醫療用的藥品如斯中藥常分為上中下三品然是等分類是否亦與科學的研究相符合實有一究之必要著者為研究整理中藥計故先行如上記之預備的試驗欲究明其某也者為有毒而可以研究某也毫無特別成分無試驗之價值兼及欲證明其上中下三品之分類有無價值也如因此小試驗能省略同志者研究中藥之時間時則感無上之光榮矣以上一百種生藥中劉寄扳佛耳草白扁豆紫蘇排草香金英子韭菜子冬瓜子淡竹葉不食草西河柳椿根皮鳳尾草伸筋草小胡麻雞冠花紫槿皮土槿皮白河車七星草小青草追風草何白草協枝草老化草功勞子通天草等二十七種為神農本草經中所未記載者次更取其一百種中神農本草經中有記載之七十三種依上中下三品之分類法分類之再以表示其對於所用十六種之贋鹼試藥之半數以上呈陽性反應者時則如次上中下三藥對試藥之反應率觀上表可知神農本草經中上中下三品之區別雖不能如同書記載在功效上有嚴格的界限但在大體自成分上觀察時可認為其分類並非全屬無稽也
